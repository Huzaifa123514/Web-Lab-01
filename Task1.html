<!DOCTYPE html>
<html>
<head>
    <title>Task 1 - let and const</title>
</head>
<body>

<h2>Check Console for Output</h2>

<script>
    // let (change ho sakta hai)
    let age = 20;
    age = 21;

    // const (change nahi hota)
    const name = "Ahmad";

    console.log("Age:", age);
    console.log("Name:", name);

    // name = "Ali"; // ❌ error ayega agar uncomment karo
</script>

</body>
</html>
