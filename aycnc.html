<!DOCTYPE html>

<title>Async Task</title>

<body>

<script>
async function getUser() {
    const response = await fetch("https://jsonplaceholder.typicode.com/users/1");
    const data = await response.json();
    console.log(data.name);
}

getUser();
</script>

</body>
</html>
